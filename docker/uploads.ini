; Raises PHP's upload limits to match the app-level MAX_UPLOAD_SIZE constant
; (api/config/constants.php). The stock php:8.1-apache image defaults to
; upload_max_filesize=2M, which silently truncated uploads (UPLOAD_ERR_INI_SIZE)
; for anything larger — including AI-generated PNGs (2-4MB) and any recipe
; photo over 2MB, well under the app's intended 10MB cap.
upload_max_filesize = 12M
post_max_size = 14M
